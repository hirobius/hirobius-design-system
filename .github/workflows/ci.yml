name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Typecheck, validators, build, and Playwright (desktop)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Generated data files (src/app/data/*.json) are gitignored but imported
      # by source, so they must exist before typecheck. Regenerate them here.
      - name: Generate data artifacts
        run: node scripts/generate-manifest.mjs && node scripts/generate-component-api.mjs && node scripts/enrich-manifest.mjs && node scripts/sync-icons.mjs && node scripts/audit-tokens.mjs --full

      - name: Typecheck
        run: pnpm typecheck

      # Unit + contract tests (vitest). Includes tests/primitive-contracts/*.contract.test.tsx
      # (React Testing Library); Playwright (testMatch '**/*.spec.ts') runs the e2e/visual specs.
      - name: Unit tests (vitest)
        run: pnpm exec vitest run

      - name: Full checks
        run: pnpm check:full

      - name: Build
        run: pnpm build

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Playwright — desktop (chromium project)
        run: pnpm exec playwright test --project=chromium
