name: Visual regression

on:
  pull_request:
    branches: [main]
    # `labeled` so adding the `update-snapshots` label fires a re-baseline run
    # (default types are opened/synchronize/reopened, which exclude labeling).
    types: [opened, synchronize, reopened, labeled]

concurrency:
  group: visual-${{ github.ref }}
  cancel-in-progress: true

# Re-baseline path (add the `update-snapshots` label to the PR) commits the
# regenerated PNGs back to the PR branch, so it needs write access.
permissions:
  contents: write

jobs:
  visual:
    name: Visual regression tests
    runs-on: ubuntu-latest
    # NOTE: Not a required check for merge yet — needs a baseline run to confirm green.
    # Expected to pass; promote to branch-protection-required after first smoke run.

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Check out the PR head branch (not the detached merge ref) so the
          # re-baseline path can commit updated snapshots straight back to it.
          ref: ${{ github.head_ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (catches Vite/asset issues)
        run: pnpm build

      - name: Install Playwright (chromium only)
        run: pnpm exec playwright install --with-deps chromium

      - name: Visual tests (update snapshots)
        if: contains(github.event.pull_request.labels.*.name, 'update-snapshots')
        run: pnpm test:visual:update

      - name: Commit regenerated baselines
        if: contains(github.event.pull_request.labels.*.name, 'update-snapshots')
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual.spec.ts-snapshots
          if git diff --cached --quiet; then
            echo "No baseline changes to commit."
          else
            # --no-verify: this is a generated-PNG commit; the husky pre-commit
            # code gates are irrelevant to it and shouldn't run in CI.
            git commit --no-verify -m "chore: regen visual baselines [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Visual tests
        if: "!contains(github.event.pull_request.labels.*.name, 'update-snapshots')"
        run: pnpm test:visual
