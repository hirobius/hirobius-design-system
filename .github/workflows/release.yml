name: Release

# Publishes @hirobius/design-system to the PUBLIC npm registry
# (https://registry.npmjs.org). Anyone can `npm install @hirobius/design-system`
# with no auth — the package is public and unscoped-registry.
#
# Flow (Changesets):
#   1. Feature PRs add a changeset (`pnpm changeset add`) describing the bump.
#   2. On merge to main, this workflow opens/updates a "Version Packages" PR
#      that applies the bumps + updates CHANGELOG.md.
#   3. Merging that PR runs `pnpm release` (build:lib + changeset publish),
#      publishing the new version to public npm.
#
# Auth: publishing to public npm needs an npm token (GITHUB_TOKEN cannot publish
# outside GitHub Packages). Provision it as the repo secret NPM_TOKEN:
#   - npmjs.com → your account → Access Tokens → Generate → "Automation"
#     (Automation tokens bypass 2FA, required for CI publishes).
#   - The @hirobius scope/org must exist on npmjs.com and the token's account
#     must be a member with publish rights.
#   - Add the value as the GitHub repo secret NPM_TOKEN (Settings → Secrets and
#     variables → Actions).

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
          scope: '@hirobius'

      - run: pnpm install --frozen-lockfile

      - name: Create release PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
        env:
          # GITHUB_TOKEN authors/updates the "Version Packages" PR and pushes tags.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN publishes to public npm. Must be an npm "Automation" token
          # for an account with publish rights on the @hirobius scope (see the
          # header comment for provisioning steps).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Skip husky git hooks ONLY for the bot "Version Packages" commit this
          # action makes. The hooks are local-dev guards (typecheck/lint/registry)
          # that assume gitignored generated data artifacts exist, which they
          # don't on a fresh CI checkout. Scoped to this step so the earlier
          # `pnpm install` prepare/setup-hooks still runs normally.
          HUSKY: '0'
