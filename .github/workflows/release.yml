name: Release

# Publishes @hirobius/design-system to GitHub Packages.
#
# Flow (Changesets):
#   1. Feature PRs add a changeset (`pnpm changeset add`) describing the bump.
#   2. On merge to main, this workflow opens/updates a "Version Packages" PR
#      that applies the bumps + updates CHANGELOG.md.
#   3. Merging that PR runs `pnpm release` (build:lib + changeset publish),
#      publishing the new version to GitHub Packages.
#
# Auth uses the built-in GITHUB_TOKEN — no extra secrets required for the
# hirobius org's own GitHub Packages registry.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Husky git hooks are developer-side guards (typecheck, lint, registry gates)
# that assume locally-generated, gitignored data artifacts exist. The Changesets
# action makes a bot "Version Packages" commit on a fresh checkout where those
# artifacts are absent, so the pre-commit hook would fail. Disable hooks for CI —
# the gates run in their own workflows, not on bot commits.
env:
  HUSKY: '0'

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@hirobius'

      - run: pnpm install --frozen-lockfile

      - name: Create release PR or publish to GitHub Packages
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
