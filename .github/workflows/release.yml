name: Release

# Publishes @hirobius/design-system to GitHub Packages.
#
# Flow (Changesets):
#   1. Feature PRs add a changeset (`pnpm changeset add`) describing the bump.
#   2. On merge to main, this workflow opens/updates a "Version Packages" PR
#      that applies the bumps + updates CHANGELOG.md.
#   3. Merging that PR runs `pnpm release` (build:lib + changeset publish),
#      publishing the new version to GitHub Packages.
#
# Auth uses the built-in GITHUB_TOKEN — no extra secrets required for the
# hirobius org's own GitHub Packages registry.

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@hirobius'

      - run: pnpm install --frozen-lockfile

      - name: Create release PR or publish to GitHub Packages
        uses: changesets/action@v1
        with:
          version: pnpm changeset:version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip husky git hooks ONLY for the bot "Version Packages" commit this
          # action makes. The hooks are local-dev guards (typecheck/lint/registry)
          # that assume gitignored generated data artifacts exist, which they
          # don't on a fresh CI checkout. Scoped to this step so the earlier
          # `pnpm install` prepare/setup-hooks still runs normally.
          HUSKY: '0'
