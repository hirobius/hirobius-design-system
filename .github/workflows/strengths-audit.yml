name: Strengths audit

on:
  workflow_dispatch:
  schedule:
    # Weekly Monday 13:00 UTC
    - cron: '0 13 * * 1'

jobs:
  audit:
    name: Audit documented differentiators
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run strengths audit
        id: audit
        run: node scripts/audit-strengths.mjs
        continue-on-error: true

      - name: Capture audit output (JSON)
        if: always()
        id: audit-json
        run: |
          OUTPUT=$(node scripts/audit-strengths.mjs --json 2>&1 || true)
          echo "output<<EOF" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Open drift issue on failure
        if: steps.audit.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          AUDIT_OUT=$(node scripts/audit-strengths.mjs 2>&1 || true)
          gh issue create \
            --title "[strengths-audit] drift detected ${DATE}" \
            --body "## Strengths audit drift detected

          The weekly strengths audit found one or more checks failing on \`$(date -u)\`.

          ### Script output
          \`\`\`
          ${AUDIT_OUT}
          \`\`\`

          ### Action required
          Review \`docs/architecture/strengths-and-differentiators.md\` and the failing checks in \`scripts/audit-strengths.mjs\`.
          Either fix the drift or update the documented threshold if a deliberate retirement was made.

          *Auto-opened by [strengths-audit.yml](../../actions/workflows/strengths-audit.yml)*"

      - name: Fail the workflow if audit failed
        if: steps.audit.outcome == 'failure'
        run: |
          echo "Strengths audit failed. An issue has been opened. See above for details."
          exit 1
